naftiko: 1.0.0-alpha2
info:
  label: Acquia Cloud API - Cloud IDE — Cloud IDE
  description: 'Acquia Cloud API - Cloud IDE — Cloud IDE. 2 operations. Lead operation: Acquia De-provisions a Specific Cloud
    IDE.. Self-contained Naftiko capability covering one Acquia business surface.'
  tags:
  - Acquia
  - Cloud IDE
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACQUIA_API_KEY: ACQUIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-cloud-ide-cloud-ide
    baseUri: ''
    description: Acquia Cloud API - Cloud IDE — Cloud IDE business capability. Self-contained, no shared references.
    resources:
    - name: ides-ideUuid
      path: /ides/{ideUuid}
      operations:
      - name: deleteide
        method: DELETE
        description: Acquia De-provisions a Specific Cloud IDE.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getide
        method: GET
        description: Acquia Returns Cloud IDE Info.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ACQUIA_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-cloud-ide-cloud-ide-rest
    port: 8080
    description: REST adapter for Acquia Cloud API - Cloud IDE — Cloud IDE. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/ides/{ideuuid}
      name: ides-ideuuid
      description: REST surface for ides-ideUuid.
      operations:
      - method: DELETE
        name: deleteide
        description: Acquia De-provisions a Specific Cloud IDE.
        call: cloud-cloud-ide-cloud-ide.deleteide
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getide
        description: Acquia Returns Cloud IDE Info.
        call: cloud-cloud-ide-cloud-ide.getide
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-cloud-ide-cloud-ide-mcp
    port: 9090
    transport: http
    description: MCP adapter for Acquia Cloud API - Cloud IDE — Cloud IDE. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: acquia-de-provisions-specific-cloud
      description: Acquia De-provisions a Specific Cloud IDE.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-cloud-ide-cloud-ide.deleteide
      outputParameters:
      - type: object
        mapping: $.
    - name: acquia-returns-cloud-ide-info
      description: Acquia Returns Cloud IDE Info.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-cloud-ide-cloud-ide.getide
      outputParameters:
      - type: object
        mapping: $.
