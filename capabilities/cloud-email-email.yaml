  description: 'Acquia Cloud API - Email — Email. 1 operations. Lead operation: Acquia Returns the Status of Platform Email
    for an Environment.. Self-contained Naftiko capability covering one Acquia business surface.'
  tags:
  - Acquia
  - Email
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ACQUIA_API_KEY: ACQUIA_API_KEY
capability:
