  - type: http
    namespace: cloud-email-email
    baseUri: ''
    description: Acquia Cloud API - Email — Email business capability. Self-contained, no shared references.
    resources:
    - name: environments-environmentId-email
      path: /environments/{environmentId}/email
      operations:
      - name: getemailstatus
        method: GET
        description: Acquia Returns the Status of Platform Email for an Environment.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
