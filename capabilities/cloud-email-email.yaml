    resources:
    - path: /v1/environments/{environmentid}/email
      name: environments-environmentid-email
      description: REST surface for environments-environmentId-email.
      operations:
      - method: GET
        name: getemailstatus
        description: Acquia Returns the Status of Platform Email for an Environment.
        call: cloud-email-email.getemailstatus
        outputParameters:
        - type: object
          mapping: $.
