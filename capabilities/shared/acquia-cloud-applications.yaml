naftiko: "1.0.0-alpha1"

info:
  label: Acquia Cloud Applications API
  description: Acquia Cloud API for managing Drupal applications, deployments, environments, and cloud infrastructure.
  tags:
    - Acquia
    - Applications
    - Cloud
    - Drupal
    - Environments
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ACQUIA_OAUTH_TOKEN: ACQUIA_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: acquia-cloud
      baseUri: https://cloud.acquia.com/api
      description: Acquia Cloud Platform API for application and environment management
      authentication:
        type: bearer
        token: "{{ACQUIA_OAUTH_TOKEN}}"
      resources:
        - name: applications
          path: /applications
          description: Drupal application management
          operations:
            - name: list-applications
              method: GET
              description: List all applications the current user has access to
              inputParameters:
                - name: sort
                  in: query
                  type: string
                  required: false
                  description: Sort field
                - name: filter
                  in: query
                  type: string
                  required: false
                  description: Filter criteria
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-application
              method: GET
              description: Get details about a specific application by UUID
              inputParameters:
                - name: applicationUuid
                  in: path
                  type: string
                  required: true
                  description: Application UUID
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: environments
          path: /environments
          description: Application environment management
          operations:
            - name: list-environments
              method: GET
              description: List environments for an application
              inputParameters:
                - name: applicationUuid
                  in: query
                  type: string
                  required: false
                  description: Application UUID to filter environments
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-environment
              method: GET
              description: Get details about a specific environment
              inputParameters:
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: Environment identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: organizations
          path: /organizations
          description: Organization management
          operations:
            - name: list-organizations
              method: GET
              description: List all organizations the current user belongs to
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: account
          path: /account
          description: Current user account management
          operations:
            - name: get-account
              method: GET
              description: Get details about the current user account
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: acquia-cloud-api
      resources:
        - path: /v1/applications
          name: applications
          description: Application management
          operations:
            - method: GET
              name: list-applications
              description: List all applications
              call: "acquia-cloud.list-applications"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/environments
          name: environments
          description: Environment management
          operations:
            - method: GET
              name: list-environments
              description: List environments
              call: "acquia-cloud.list-environments"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: acquia-cloud-mcp
      transport: http
      tools:
        - name: list-applications
          description: List all Acquia Cloud Drupal applications accessible to the current user
          hints:
            readOnly: true
            openWorld: true
          call: "acquia-cloud.list-applications"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: Get details about a specific Acquia Cloud application
          hints:
            readOnly: true
            idempotent: true
          call: "acquia-cloud.get-application"
          with:
            applicationUuid: "tools.applicationUuid"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-environments
          description: List environments for an Acquia Cloud application
          hints:
            readOnly: true
            openWorld: true
          call: "acquia-cloud.list-environments"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account
          description: Get the current Acquia Cloud user account details
          hints:
            readOnly: true
            idempotent: true
          call: "acquia-cloud.get-account"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-organizations
          description: List all organizations the current Acquia user belongs to
          hints:
            readOnly: true
            openWorld: true
          call: "acquia-cloud.list-organizations"
          outputParameters:
            - type: object
              mapping: "$."
