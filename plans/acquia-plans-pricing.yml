specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Acquia
providerId: acquia
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content
  - Experience
  - Drupal
  - DXP
  - CDP
  - DAM
description: Acquia is a Drupal-centric digital experience platform (DXP) with products spanning hosting
  (Cloud Platform, Site Factory), content (Source, Content Optimization, Web Governance), assets (DAM,
  PIM), and customer data / personalization (CDP, Campaign Studio, Conversion Optimization). Acquia does
  not publish per-product pricing on the public site — every product is "Request a demo / Contact sales".
sources:
  - https://www.acquia.com/products
notes: All Acquia products are sold through enterprise contact-sales motions. No public per-month, per-site,
  or per-API price points are published. Reconciled flag is false because there are no published prices
  to capture.
plans:
  - id: acquia-cloud-platform
    name: Cloud Platform
    type: enterprise
    description: Drupal-optimized hosting and ops platform. Per-environment / per-application pricing
      negotiated with Acquia sales.
    entries:
      - label: Annual subscription
        name: cloud_platform
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Drupal-optimized hosting
      - name: Acquia Cloud API
      - name: Multi-environment workflows
      - name: SLA and support
  - id: acquia-site-factory
    name: Site Factory
    type: enterprise
    description: Multi-site Drupal management; sized by number of managed sites.
    entries:
      - label: Annual subscription
        name: site_factory
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Multi-site governance
      - name: Site provisioning API
  - id: acquia-dam
    name: DAM (Widen)
    type: enterprise
    description: Digital asset management; sized by users and assets.
    entries:
      - label: Annual subscription
        name: dam
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
    elements:
      - name: Asset management
      - name: Brand portals
      - name: Workflows and approvals
  - id: acquia-pim
    name: PIM
    type: enterprise
    description: Product information management.
    entries:
      - label: Annual subscription
        name: pim
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Product data modeling
      - name: Channel syndication
  - id: acquia-cdp
    name: CDP
    type: enterprise
    description: Customer data platform; sized by profiles and ingest volume.
    entries:
      - label: Annual subscription
        name: cdp
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Unified profiles
      - name: Identity resolution
      - name: Audience activation
  - id: acquia-campaign-studio
    name: Campaign Studio
    type: enterprise
    description: Multichannel marketing automation.
    entries:
      - label: Annual subscription
        name: campaign_studio
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Multichannel campaigns
      - name: Email automation
  - id: acquia-conversion-optimization
    name: Conversion Optimization (Personalization)
    type: enterprise
    description: Personalization and behavioral analytics.
    entries:
      - label: Annual subscription
        name: cx_optimization
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
