                    error: not_found
                    message: The organization you are trying to delete does not exist, or you do not have permission to delete it.
                Not Found:
                  value:
                    error: not_found
                    message: The organization with UUID bfafd31a-83a6-4257-b0ec-afdeff83117a does not exist.
