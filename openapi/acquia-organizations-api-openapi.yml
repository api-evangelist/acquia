                No organization:
                  value:
                    error: not_found
                    message: The organization with UUID 07557159-264f-45eb-8f70-553b8ed21b16 does not exist.
                No user:
                  value:
                    error: not_found
                    message: The user with UUID 3ba405e6-8621-4557-b78a-7d92baa79783 does not exist.
        '409':
          description: Conflict
          content:
