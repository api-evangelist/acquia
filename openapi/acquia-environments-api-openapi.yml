      schema:
        maxLength: 255
        minLength: 1
        pattern: ^(?!(ACQUIA_|AH_))[A-Za-z_][A-Za-z0-9_]*$
        type: string
    Acquia_Cloud_API_Documentation_certificate-id:
      description: An ID that uniquely identifies a certificate.
      example: 7
      in: path
      name: certificateId
      required: true
      schema:
        type: integer
    Acquia_Cloud_API_Documentation_from-stack-metrics:
      description: An ISO-8601 formatted date retrieve metrics from.
      example: '2021-01-29T22:45:21+00:00'
      in: query
      name: from
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_filter-usage-metrics:
      description: 'The filters query string parameter restricts the data returned from your request. Filtered queries restrict the rows that do (or do not) get included in the result by testing each row in the result against the filters. Not all fields are filterable.


        Filter parameters include:

        * `from` - Specifies absolute time period to retrieve results from. Requires ISO 8601 format.

        * `to` - Specifies absolute time period to retrieve results until. Requires ISO 8601 format.


        Formatting examples:

        * `2023-09-01`

        * `2023-09-01T00%3A00%3A00.000Z` (`2023-09-01T00:00:00.000Z`)


        Usage examples:

        * `{endpoint}?filter=from%3D2025-04-01,to%3D2025-04-30` (`from` is `2025-04-01` and `to` is `2025-04-30`)

        * `{endpoint}?filter=from%3D2025-04-01T00:00:00.000Z,to%3D2025-04-30T23:59:59.000Z` (`from` is `2025-04-01T00:00:00.000Z` and `to` is `2025-04-30T23:59:59.000Z`)

        '
      in: query
      name: filter
      required: false
      schema:
        minimum: 1
        type: string
    Acquia_Cloud_API_Documentation_log-type:
      description: An ID that uniquely identifies a log type.
      example: php-error
      in: path
      name: logType
      required: true
      schema:
        enum:
        - apache-access
        - apache-error
        - drupal-request
        - drupal-watchdog
        - fpm-access
        - fpm-error
        - php-error
        - cloud-hook
        - cronjob
        - mysql-slow-query
        type: string
    Acquia_Cloud_API_Documentation_deprecated-from:
      deprecated: true
      description: (Use filter `from` instead.) Specifies an [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) formatted date. Used in conjunction with `to` query.
      example: '2019-10-01'
      in: query
      name: from
      required: false
      schema:
        type: string
    Acquia_Cloud_API_Documentation_offset:
      description: An integer to signify the offset to paginate from.
      example: 10
      in: query
      name: offset
      required: false
      schema:
        type: integer
    Acquia_Cloud_API_Documentation_log-forwarding-destination-uuid:
      description: The entity's universally unique identifier.
      example: dbd8a966-2b25-11e9-b210-d663bd873d93
      in: path
      name: logForwardingDestinationUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_sort:
      description: 'A comma-delimited string with fields used for sorting. The order of the fields is significant. A leading - in the field indicates the field should be sorted in a descending order. Not all fields are sortable.

        '
      example: field1,-field2
      in: query
      name: sort
      required: false
      schema:
        minimum: 1
        type: string
    Acquia_Cloud_API_Documentation_limit:
      description: The maximum number of items to return.
      example: 10
      in: query
      name: limit
      required: false
      schema:
        type: integer
    Acquia_Cloud_API_Documentation_to-no-default:
      description: An ISO-8601 formatted date retrieve results to.
      example: '2021-01-29T23:55:21+00:00'
      in: query
      name: to
      required: false
      schema:
        type: string
    Acquia_Cloud_API_Documentation_domain:
