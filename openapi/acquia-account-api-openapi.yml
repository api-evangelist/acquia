components:
  parameters:
    Acquia_Cloud_API_Documentation_token-uuid:
      description: The token entity's universally unique identifier.
      example: 882f3258-2fe9-11e9-b210-d663bd873d93
      in: path
      name: tokenUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_filter:
      description: 'The filters query string parameter restricts the data returned from your request. Filtered queries restrict the rows that do (or do not) get included in the result by testing each row in the result against the filters. Not all fields are filterable.


        There are eight filter operators that can be used and they must be URL encoded in order to be included. The operators are:


        * Equals: `= (%3D)`

        * Does not equal: `!= (!%3D)`

        * Greater than: `> (%3E)`

        * Less than: `< (%3C)`

        * Greater than or equal to: `>= (%3E%3D)`

        * Less than or equal to: `<= (%3C%3D)`

        * Contains substring: `=@ (%3D@)`

        * Does not contain substring: `!@ (!@)`


        Filters can be combined using `OR` and `AND` boolean logic. The `OR` operator is defined using a comma (`,`) and the `AND` operator is defined using a semi-colon (`;`).


        Some examples:

        * `filter=field%3Dvalue` (`field` equals `''value''`)

        * `filter=field%3D@*partialmatch` (`field` ends with `''partialmatch''`)

        * `filter=field%3D@*partialmatch,field%3Dvalue` (`field` ends with `''partialmatch''` OR `field` equals `''value''`)

        * `filter=field%3D@*partialmatch,field%3Dvalue;field2%3C5` (`field` ends with `''partialmatch''` OR `field` equals `''value''` AND `field2` > `5`)

        '
      in: query
      name: filter
      required: false
      schema:
        minimum: 1
        type: string
    Acquia_Cloud_API_Documentation_offset:
      description: An integer to signify the offset to paginate from.
      example: 10
      in: query
      name: offset
      required: false
      schema:
        type: integer
    Acquia_Cloud_API_Documentation_sort:
      description: 'A comma-delimited string with fields used for sorting. The order of the fields is significant. A leading - in the field indicates the field should be sorted in a descending order. Not all fields are sortable.

        '
      example: field1,-field2
      in: query
      name: sort
      required: false
      schema:
        minimum: 1
        type: string
    Acquia_Cloud_API_Documentation_limit:
      description: The maximum number of items to return.
      example: 10
      in: query
      name: limit
      required: false
      schema:
        type: integer
    Acquia_Cloud_API_Documentation_organization-uuid:
      description: The organization entity's universally unique identifier.
      example: 1e7efab9-0fac-4a2c-ad94-61efc78623ba
      in: path
      name: organizationUuid
      required: true
      schema:
        format: uuid
        maxLength: 36
        minLength: 36
        type: string
    Acquia_Cloud_API_Documentation_subscription-uuid:
      description: The subscription entity's universally unique identifier.
      example: 0f3ad33e-2fe4-11e9-b210-d663bd873d93
      in: path
      name: subscriptionUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_from:
      description: 'Specifies absolute time period to retrieve results from. Requires ISO 8601 format.


        Some examples:

        * `2023-09-01`

        * `2023-09-01T00%3A00%3A00.000Z` (`2023-09-01T00:00:00.000Z`)

        '
      example: '2023-09-01'
      in: query
      name: from
      required: false
      schema:
        type: string
    Acquia_Cloud_API_Documentation_team-uuid:
      description: The entity's universally unique identifier.
      example: 3eef5d81-62f4-429c-aa94-e17d05ab4740
      in: path
      name: teamUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_to:
      description: 'Optionally specifies absolute time period to retrieve results until. Requires ISO 8601 format.


        Some examples:

        * `2023-09-29`

        * `2023-09-29T00%3A00%3A00.000Z` (`2023-09-29T00:00:00.000Z`)

        '
      example: '2023-09-29'
      in: query
      name: to
      required: false
      schema:
        type: string
    Acquia_Cloud_API_Documentation_application-uuid:
      description: The entity's universally unique identifier.
      example: da1c0a8e-ff69-45db-88fc-acd6d2affbb7
      in: path
      name: applicationUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_ssh-key-uuid:
      description: The SSH key entity's universally unique identifier.
      example: 981b7910-2fe9-11e9-b210-d663bd873d93
      in: path
      name: sshKeyUuid
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_permission:
      description: Specifies the permission you wish to check access for.
      example: deploy to prod
      in: query
      name: permission
      required: true
      schema:
        type: string
    Acquia_Cloud_API_Documentation_drush-version:
      description: Specifies the drush aliases formatting, either 8 (example.aliases.drushrc.php) or 9 (example.site.yaml)
      example: 8
      in: query
      name: version
      required: true
      schema:
        enum:
        - 8
        - 9
        type: integer
    Acquia_Cloud_API_Documentation_token-delete-reason:
