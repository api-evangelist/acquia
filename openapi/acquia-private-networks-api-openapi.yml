      security:
      - Private_Network_Service_API_BearerAuth: []
        Private_Network_Service_API_ClientCredentials: []
        Private_Network_Service_API_OIDC: []
  /private-networks/{privateNetworkId}/connections/vpc-peers/{vpcPeerId}:
