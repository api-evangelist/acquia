    Private_Network_Service_API_Filter:
      name: filter
      in: query
      description: 'Filter the result set using field-based criteria.


        **Format:** `field:value`, `field=value` or `field:operator:value`


        **Logical operators:**

        - `,` (comma) - OR logic between filters

        - `;` (semicolon) - AND logic between filters

        - **Note:** Cannot mix OR and AND operators in the same query


        **Comparison operators:**

        - `=` - Equals (default if no operator specified)

        - `!=` - Does not equal

        - `>` - Greater than

        - `<` - Less than

        - `>=` - Greater than or equal to

        - `<=` - Less than or equal to

        - `=@` - Contains substring

        - `!@` - Does not contain substring


        **Wildcards:**

        - `*` - Wildcard character for pattern matching


        **Examples:**

        - `status=active` - Filter by status equals active

        - `name=@prod` - Filter by name containing "prod"

        - `status=active;type=standard` - Status is active AND type is standard

        - `status=active,status=pending` - Status is active OR pending

        '
      required: false
      schema:
        type: string
        pattern: ^([a-zA-Z0-9_]+[:=](?:[a-zA-Z0-9_\-*]+|[><!@=%3D%3E%3C%3D@!%3D@]+)+)([;,][a-zA-Z0-9_]+[:=](?:[a-zA-Z0-9_\-*]+|[><!@=%3D%3E%3C%3D@!%3D@]+)+)*$
      example: status:active;type:standard
    Private_Network_Service_API_Sort:
      name: sort
      in: query
      description: 'Sort the result set by one or more fields.


        **Format:** `field1,field2,-field3`


        **Sort order:**

        - No prefix - Ascending order (default)

        - `-` prefix - Descending order


        **Multiple fields:**

        - Fields are processed in the order specified

        - First field has highest priority

        - Use comma to separate multiple fields


        **Examples:**

        - `name` - Sort by name in ascending order

        - `-created_at` - Sort by created_at in descending order

        - `name,-created_at` - Sort by name ascending, then created_at descending

        - `status,name,-updated_at` - Sort by status ascending, then name ascending, then updated_at descending

        '
      required: false
      schema:
        type: string
        pattern: ^(-?[a-zA-Z0-9_]+)(,-?[a-zA-Z0-9_]+)*$
      example: name,-created_at
    Private_Network_Service_API_PrivateNetworkId:
      name: privateNetworkId
      in: path
      required: true
      description: ID of the private network
      schema:
        type: string
    Private_Network_Service_API_VpnId:
      name: vpnId
      in: path
      required: true
      description: ID of the VPN
      schema:
        type: integer
    Private_Network_Service_API_Offset:
      name: offset
      in: query
      description: The number of items to skip before starting to collect the result set.
      required: false
      schema:
        type: integer
        minimum: 0
        example: 20
  securitySchemes:
    Acquia_Cloud_API_Documentation_OAuth2:
      description: 'All Cloud API calls need to be authenticated in order to work. You authenticate using a token that you can generate on your Acquia Profile page.


        ### To generate a token:


        1. Sign in to the [Acquia Cloud](https://cloud.acquia.com/) interface using your email address and Acquia password.

        2. Click your user avatar in the upper right corner, and then click **Account Settings**.

        3. On the Profile page, click **API Tokens**.

        4. Click **Create Token**.

        5. In the pop-up that appears, give your token a label so that you can easily find it later. Then click **Create Token**.

        6. Copy your API key and API secret. Click **OK**.

        '
      flows:
