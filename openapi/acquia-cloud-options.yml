      name: Authorization
      type: apiKey
info:
  contact:
    name: Customer Experience Engineering (CXE)
    url: https://www.acquia.com
  description: "Acquia Cloud API\n\n# Compatibility\n\n## Stability\n\nThe response\
    \ for all resource endpoints includes an `X-CloudAPI-Stability` header that indicates\
    \ what changes, if any, Acquia will make to the resource and how changes will\
    \ be communicated.\n\nThere are three levels of stability:\n\n* `prototype`: A\
    \ prototype resource is experimental and major changes are likely. A prototype\
    \ resource may not reach production.\n    * Compatible and emergency changes may\
    \ be made with no advance notice\n    * Disruptive changes may be made with one\
    \ week notice\n    * Deprecated resources will remain available for at least one\
    \ month after deprecation\n* `development`: A resource that is unlikely to change,\
    \ but is still being worked on, will be marked as in development. These resources\
    \ are very likely to reach production.\n    * Compatible and emergency changes\
    \ may be made with no advance notice\n    * Disruptive changes may be made with\
    \ one month notice\n    * Deprecated resources will remain available for at least\
    \ six months after deprecation\n* `production`: A production resource will not\
    \ introduce breaking changes within a version, and any breaking changes between\
    \ versions will be communicated ahead of time.\n\n## Deprecation\n\nOver time,\
    \ endpoints may become obsolete and will be removed in the future. These endpoints\
    \ will be marked with an `X-CloudAPI-Deprecated` header indicating the version\
    \ in which they were deprecated and the reason for the deprecation. Deprecated\
    \ endpoints may be removed in the next version of the resource.\n\n## Versioning\n\
    \nAll resource endpoints are versioned within the API. Endpoints that have reached\
    \ production will not introduce breaking changes between versions. Non-production\
    \ endpoints will not version for changes.\n\nA specific version of an endpoint\
    \ can be requested via the `Accept` header:\n\n    Accept: application/hal+json,\
    \ version=2\n\nIf the version is not specified, the latest version of the endpoint\
    \ will be used.\n\nStarting with version 3, we will support the current version\
    \ of an endpoint and the previous version. Version 1 of the API is [provided elsewhere](https://cloudapi.acquia.com/).\n\
    \n## Errors\n\nSome endpoints will return a 503 status when dependent services\
    \ are unavailable:\n\n    application/hal+json\n    {\n        \"error\": \"system\"\
    ,\n        \"message\": \"This action is currently unavailable. Please try again\
    \ later.\"\n    }\n\n## Authentication\n\nAll Acquia Cloud API calls require authentication\
    \ to work properly.\n\nLearn more: <a href='https://docs.acquia.com/acquia-cloud/develop/api/auth/'\
    \ target='_blank'>https://docs.acquia.com/acquia-cloud/develop/api/auth/</a>\n\
    \n### Example implementation\n\nAn example PHP script for making authenticated\
    \ API requests can be found <a href='https://docs.acquia.com/resources/useful-references'\
    \ target='_blank'>here</a>. This script uses the <a href='https://oauth2-client.thephpleague.com/'\
    \ target='_blank'>League/oauth2-client</a> library, installed via Composer.\n"
  title: Acquia Cloud API - Options
