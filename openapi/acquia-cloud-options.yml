paths:
  /options:
    get:
      description: Does not return any data. Allows traversal of options groups endpoints.
      operationId: getOptions
      responses:
        '200':
          content:
            application/hal+json:
              example:
                _links:
                  cde-sizes:
                    href: https://cloud.acquia.com/api/options/cde-sizes
                  log-forwarding:
                    href: https://cloud.acquia.com/api/options/log-forwarding
                  self:
                    href: https://cloud.acquia.com/api/options
              schema:
                properties:
                  _links:
                    $ref: '#/components/schemas/Acquia_Cloud_API_Documentation_links'
          description: OK
      summary: Acquia Does Not Return Any Data. Allows Traversal of Options Groups
        Endpoints.
      tags:
      - Options
      x-cli-name: options:list
  /options/cde-sizes:
    get:
      description: Displays the various CD Environment size options.
      operationId: getCdeSizes
      responses:
        '200':
          content:
            application/hal+json:
              example:
                _embedded:
                  items:
                  - databases: 3
                    memory: 256
                    name: 1X
                    size: 1x
                    slots: 1
                    storage: 5
                  - databases: 6
                    memory: 512
                    name: 2X
                    size: 2x
                    slots: 2
                    storage: 10
                  - databases: 9
                    memory: 768
                    name: 3X
                    size: 3x
                    slots: 3
                    storage: 15
                  - databases: 12
                    memory: 1024
                    name: 4X
                    size: 4x
                    slots: 4
                    storage: 20
                  - databases: 24
                    memory: 2048
                    name: 8X
                    size: 8x
                    slots: 8
                    storage: 40
                _links:
                  parent:
                    href: https://cloud.acquia.com/api/options
                  self:
                    href: https://cloud.acquia.com/api/options/cde-sizes
                total: 5
              schema:
                $ref: '#/components/schemas/Acquia_Cloud_API_Documentation_cde-sizes'
          description: OK
      summary: Acquia Displays the Various CD Environment Size Options.
      tags:
      - Options
      x-cli-name: options:cde-sizes-list
  /options/colors:
    get:
      description: Displays the various color options.
      operationId: getColors
      responses:
        '200':
          content:
            application/hal+json:
              example:
                _embedded:
                  items:
                  - color: blue
                  - color: blush
                  - color: gray
                  - color: green
                  - color: light-blue
                  - color: orange
                  - color: pink
                  - color: purple
                  - color: teal
                  - color: yellow
                _links:
                  filter:
                    href: https://cloud.acquia.com/api/options/colors{?filter}
                    templated: true
                  limit:
                    href: https://cloud.acquia.com/api/options/colors{?limit}
                    templated: true
                  offset:
                    href: https://cloud.acquia.com/api/options/colors{?offset}
                    templated: true
                  parent:
                    href: https://cloud.acquia.com/api/options
                  self:
                    href: https://cloud.acquia.com/api/options/colors
                  sort:
                    href: https://cloud.acquia.com/api/options/colors{?sort}
                    templated: true
                total: 10
              schema:
                $ref: '#/components/schemas/Acquia_Cloud_API_Documentation_colors'
          description: OK
      summary: Acquia Displays the Various Color Options.
      tags:
      - Options
      x-cli-name: colors:list
