specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Acquia
providerId: acquia
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content
  - Experience
  - Drupal
  - DXP
  - Rate Limiting
description: Acquia exposes a number of APIs across its DXP — Cloud API (operational control of Drupal
  environments), Site Factory API, CDP ingestion, DAM, and Campaign Studio. Specific per-second / per-minute
  rate-limit numbers are not published on the public Cloud API documentation home page; throttling is
  applied per API and per subscription tier.
sources:
  - https://cloudapi-docs.acquia.com/
  - https://docs.acquia.com/
notes: Public Cloud API docs do not surface a numeric rate-limit table. Customers are expected to handle
  HTTP 429 responses with backoff; specific limits are confirmed through Acquia support per subscription.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Cloud API throttling
    scope: api-token
    metric: varies
    limit: see Acquia Cloud API documentation
    notes: Acquia does not publish a fixed RPS / RPM number on the public docs index; throttling is
      applied at the gateway and surfaced via 429 responses.
  - name: CDP ingestion
    scope: tenant
    metric: varies
    limit: see CDP customer onboarding guide
    notes: Profile-ingest and event-ingest throughput is sized at contract time based on event volume.
policies:
  - name: Backoff
    description: Honor 429 responses with exponential backoff and jitter; the Cloud API may return Retry-After.
  - name: Tenant Scoping
    description: Limits are applied per Acquia subscription / tenant; multiple API tokens within the
      same subscription share the underlying allowance.
  - name: Support-Raise
    description: Long-running migrations and bulk operations should be coordinated with Acquia support
      so that ceilings can be temporarily lifted.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
