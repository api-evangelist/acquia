scopes:
- scope: organization:{uuid}
  description: Grants the API token access to the resources of the organization identified
    by the given UUID; required when generating an API token for an organization that
    uses Federated Authentication.
  sources:
  - https://docs.acquia.com/acquia-cloud-platform/cloud-platform-api-v2-authentication
