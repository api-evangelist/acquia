specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Acquia
providerId: acquia
publisherName: Acquia, Inc.
serviceCategory: Digital Experience Platform
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Content
  - Experience
  - Drupal
  - DXP
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps scaffold for Acquia. Acquia's commercial model is enterprise subscription
  per product (Cloud Platform, Site Factory, DAM, PIM, CDP, Campaign Studio, Conversion Optimization,
  Search), sized by sites, environments, profiles, assets, or seats depending on the product.
sources:
  - https://www.acquia.com/products
  - https://cloudapi-docs.acquia.com/
notes: Public per-product prices are not published; meters describe the dimensions Acquia uses to size
  contracts. Replace with the dollar amounts on the customer's order form when reconciling.
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: Acquia
  ServiceCategory: Digital Experience Platform
  ProviderName: Acquia
  PublisherName: Acquia, Inc.
  InvoiceIssuerName: Acquia, Inc.
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: cloud_environment
    description: Acquia Cloud Platform application + environment subscription.
    unit: environment
    aggregation: max
    dimensions:
      - application
      - environment_size
      - region
  - name: managed_site
    description: Site managed under Site Factory.
    unit: site
    aggregation: max
    dimensions:
      - site_factory_tenant
  - name: dam_user
    description: Named DAM user (Widen) seat.
    unit: seat
    aggregation: max
    dimensions:
      - role
  - name: dam_storage
    description: Asset storage in Acquia DAM.
    unit: GB
    aggregation: max
    dimensions:
      - tenant
  - name: cdp_profile
    description: Active customer profile in Acquia CDP.
    unit: profile
    aggregation: max
    dimensions:
      - source_system
  - name: cdp_event
    description: Behavioral event ingested into CDP.
    unit: event
    aggregation: sum
    dimensions:
      - source_system
      - event_type
  - name: campaign_contact
    description: Active marketable contact in Campaign Studio.
    unit: contact
    aggregation: max
    dimensions:
      - segment
  - name: search_index
    description: Search index / core in Acquia Search.
    unit: index
    aggregation: max
    dimensions:
      - environment
principles:
  - name: Visibility
    description: Each Acquia product invoices on different dimensions; pull environment, site, profile,
      and seat counts from the Cloud API and the DAM / CDP admin consoles to build a unified usage view.
  - name: Allocation
    description: Allocate Cloud Platform and Site Factory cost to the owning brand / property; allocate
      DAM, CDP, and Campaign Studio cost to marketing-ops cost centers.
  - name: Optimization
    description: Right-size Cloud environments (down-tier non-prod, schedule lower environments off-hours),
      reclaim DAM / CDP seats from inactive users, archive cold assets out of DAM storage tiers.
  - name: Accountability
    description: Engineering platform leads own Cloud / Site Factory; marketing-ops leadership owns DAM,
      CDP, Campaign Studio, and Conversion Optimization renewals.
maintainers:
  - FN: Kin Lane
    email: info@apievangelist.com
